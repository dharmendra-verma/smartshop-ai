name: CD Staging

on:
  push:
    branches: [main]

concurrency:
  group: cd-staging
  cancel-in-progress: false

env:
  ACR_NAME: acrsmartshopstaging
  RESOURCE_GROUP: rg-smartshop-staging
  API_APP_NAME: smartshop-api-staging
  UI_APP_NAME: smartshop-ui-staging

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push API image
        run: |
          IMAGE=${{ env.ACR_NAME }}.azurecr.io/smartshop-api
          docker build -f Dockerfile --build-arg GIT_SHA=${{ github.sha }} -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Build and push UI image
        run: |
          IMAGE=${{ env.ACR_NAME }}.azurecr.io/smartshop-ui
          docker build -f Dockerfile.streamlit --build-arg GIT_SHA=${{ github.sha }} -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy API Container App
        run: |
          az containerapp update \
            --name ${{ env.API_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/smartshop-api:${{ github.sha }} \
            --set-env-vars \
              "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
              "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" \
              "REDIS_URL=${{ secrets.REDIS_URL }}" \
              "ENV=staging" \
              "LOG_LEVEL=INFO"

      - name: Deploy UI Container App
        run: |
          az containerapp update \
            --name ${{ env.UI_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/smartshop-ui:${{ github.sha }} \
            --set-env-vars \
              "API_URL=https://${{ env.API_APP_NAME }}.whiteriver-5d067381.eastus.azurecontainerapps.io"

      - name: Wait for revision to stabilize
        run: sleep 30

  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-staging
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Get staging URL
        id: staging-url
        run: |
          az login --service-principal -u "${{ fromJSON(secrets.AZURE_CREDENTIALS).clientId }}" -p "${{ fromJSON(secrets.AZURE_CREDENTIALS).clientSecret }}" --tenant "${{ fromJSON(secrets.AZURE_CREDENTIALS).tenantId }}"
          API_URL=$(az containerapp show --name ${{ env.API_APP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "api_url=https://$API_URL" >> $GITHUB_OUTPUT

      - name: Run smoke tests
        run: |
          chmod +x scripts/smoke_test.sh
          ./scripts/smoke_test.sh "${{ steps.staging-url.outputs.api_url }}"

      - name: Smoke test guidance
        if: failure()
        run: |
          echo "::warning::Smoke tests failed. Ensure these GitHub secrets are configured:"
          echo "  - DATABASE_URL (Supabase connection string)"
          echo "  - OPENAI_API_KEY"
          echo "  - REDIS_URL (Azure Redis connection string)"
