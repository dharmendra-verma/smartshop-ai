name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Manual trigger — required for eval tests

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install linting tools
        run: pip install ruff==0.1.14 black==24.1.1 mypy==1.8.0 types-requests types-redis

      - name: Run ruff
        run: ruff check app/ tests/

      - name: Run black check
        run: black --check app/ tests/

      - name: Run mypy
        run: mypy app/ --ignore-missing-imports --disable-error-code=assignment --disable-error-code=union-attr --disable-error-code=arg-type --disable-error-code=return-value

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: smartshop_ai
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smartshop_ai
      REDIS_URL: redis://localhost:6379/0
      OPENAI_API_KEY: sk-test-fake-key-for-ci
      ENV: testing
      SESSION_SECRET_KEY: ci-test-secret-key

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run unit tests (evals excluded — run manually only)
        run: pytest tests/ -v --tb=short --cov=app --cov-report=xml --cov-report=term-missing --junitxml=results.xml -m "not eval"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            results.xml
            coverage.xml

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f Dockerfile --build-arg GIT_SHA=${{ github.sha }} -t smartshop-api:test .

      - name: Build UI image
        run: docker build -f Dockerfile.streamlit --build-arg GIT_SHA=${{ github.sha }} -t smartshop-ui:test .

      - name: Verify API image
        run: docker inspect smartshop-api:test --format='{{.Config.Labels}}'

      - name: Verify UI image
        run: docker inspect smartshop-ui:test --format='{{.Config.Labels}}'

  # Eval tests — manual only, requires OPENAI_API_KEY with real credits
  evals:
    name: Eval Tests (Manual)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: smartshop_ai
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smartshop_ai
      REDIS_URL: redis://localhost:6379/0
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ENV: testing
      SESSION_SECRET_KEY: ci-test-secret-key
      RUN_EVALS: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run eval tests
        run: pytest tests/evals/ -v -s -m eval --junitxml=eval-results.xml

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results
          path: eval-results.xml
